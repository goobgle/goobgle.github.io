<!DOCTYPE html>
<html>
<head>
  <title>Goobgle Results</title>

  <script async src="https://cse.google.com/cse.js?cx=c1cd671e9342444b9"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    .top-bar {
      padding: 20px;
      border-bottom: 1px solid #ddd;
    }

    .logo span {
      font-size: 30px;
      font-weight: bold;
    }

    .blue { color: #4285F4; }
    .red { color: #EA4335; }
    .yellow { color: #FBBC05; }
    .green { color: #34A853; }

    .search-container {
      margin-top: 10px;
    }

    input.gsc-input {
      border-radius: 20px !important;
    }
  </style>

  <script>
    function getQuery() {
      let params = new URLSearchParams(window.location.search);
      return params.get("q");
    }

    function loadQuery() {
      let query = getQuery();

      if (query) {
        window.__gcse = {
          callback: function() {
            document.querySelector("input.gsc-input").value = query;
            document.querySelector("button.gsc-search-button").click();
          }
        };
      }
    }

    loadQuery();
  </script>

</head>
<body>

<div class="top-bar">
  <div class="logo">
    <span class="blue">G</span>
    <span class="red">o</span>
    <span class="yellow">o</span>
    <span class="blue">b</span>
    <span class="green">g</span>
    <span class="red">l</span>
    <span class="yellow">e</span>
  </div>
</div>

<div class="gcse-search"></div>

</body>
</html>
