<!DOCTYPE html>
<html>
<head>
  <title>Goobgle</title>
  <script type="module" src="firebase.js"></script>

  <style>
    body {
      text-align: center;
      margin-top: 120px;
      font-family: Arial;
    }

    .logo span {
      font-size: 90px;
      font-weight: bold;
    }

    .blue { color: #4285F4; }
    .red { color: #EA4335; }
    .yellow { color: #FBBC05; }
    .green { color: #34A853; }

    input {
      width: 500px;
      padding: 14px;
      border-radius: 25px;
    }
  </style>
</head>

<body>

<div class="logo">
  <span class="blue">G</span>
  <span class="red">o</span>
  <span class="yellow">o</span>
  <span class="blue">b</span>
  <span class="green">g</span>
  <span class="red">l</span>
  <span class="yellow">e</span>
</div>

<br>

<input id="q" placeholder="Search Goobgle...">
<br><br>

<button onclick="search()">Search</button>
<button onclick="location.href='login.html'">Login</button>

<script type="module">
import { currentUser, saveSearch } from "./firebase.js";

let user = null;

currentUser(u => user = u);

window.search = async function () {
  let q = document.getElementById("q").value;

  if (user) await saveSearch(user, q);

  location.href = "results.html?q=" + encodeURIComponent(q);
}
</script>

</body>
</html>
