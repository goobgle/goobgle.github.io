<!DOCTYPE html>
<html>
<head>
  <title>Goobgle Results</title>

  <!-- Your Google Programmable Search Engine -->
  <script async src="https://cse.google.com/cse.js?cx=a342734638e414f23"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    .top-bar {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #ddd;
    }

    /* FIXED LOGO */
    .logo {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: -2px; /* key fix */
    }

    .blue { color: #4285F4; }
    .red { color: #EA4335; }
    .yellow { color: #FBBC05; }
    .green { color: #34A853; }

    /* Optional: tighten even more like Google */
    .logo span {
      display: inline-block;
      margin: 0;
      padding: 0;
    }
  </style>

</head>

<body>

<div class="top-bar">
  <div class="logo">
    <span class="blue">G</span>
    <span class="red">o</span>
    <span class="yellow">o</span>
    <span class="blue">b</span>
    <span class="green">g</span>
    <span class="red">l</span>
    <span class="yellow">e</span>
  </div>
</div>

<!-- Results -->
<div class="gcse-searchresults-only"></div>

</body>
</html>
