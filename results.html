<!DOCTYPE html>
<html>
<head>
  <title>Goobgle Results</title>

  <script async src="https://cse.google.com/cse.js?cx=a342734638e414f23"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: white;
    }

    body.dark {
      background: #202124;
      color: white;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
    }

    body.dark .top-bar {
      border-bottom: 1px solid #444;
    }

    .logo {
      font-size: 24px;
      letter-spacing: -2px;
      cursor: pointer;
    }

    .search-box input {
      width: 500px;
      padding: 10px;
      border-radius: 20px;
    }

    body.dark .search-box input {
      background: #303134;
      color: white;
    }

    /* GOOGLE DARK FIX */
    body.dark .gsc-control-cse,
    body.dark .gsc-table-result,
    body.dark .gsc-result,
    body.dark .gsc-tabsArea,
    body.dark .gsc-results-wrapper-visible {
      background: #202124 !important;
      border: none !important;
    }

    body.dark .gs-title { color: #8ab4f8 !important; }
    body.dark .gs-snippet { color: #bdc1c6 !important; }

  </style>

  <script>
    function newSearch(e) {
      e.preventDefault();
      let q = document.getElementById("q").value;
      window.location.href = "results?q=" + encodeURIComponent(q);
    }

    function getCookie(name) {
      let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    }

    window.onload = function() {
      if (getCookie("darkMode") === "true") {
        document.body.classList.add("dark");
      }
    };
  </script>

</head>

<body>

<div class="top-bar">
  <div class="logo" onclick="location.href='index.html'">
    Goobgle
  </div>

  <form class="search-box" onsubmit="newSearch(event)">
    <input id="q" placeholder="Search...">
  </form>
</div>

<div class="gcse-searchresults-only"></div>

</body>
</html>
