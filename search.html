<!DOCTYPE html>
<html>
<head>
  <title>Goobgle Results</title>

  <script async src="https://cse.google.com/cse.js?cx=a342734638e414f23"></script>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="profile.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .top {
      display:flex;
      gap:20px;
      padding:10px;
      border-bottom:1px solid #ddd;
      align-items:center;
    }

    input {
      width:600px;
      padding:10px;
      border-radius:20px;
    }

    button {
      background:#f8f9fa;
      border:1px solid #f8f9fa;
      padding:8px 14px;
      border-radius:4px;
    }

    button:hover {
      border:1px solid #dadce0;
    }

    .logo span {
      font-size:22px;
      font-weight:bold;
    }

    .blue { color:#4285F4; }
    .red { color:#EA4335; }
    .yellow { color:#FBBC05; }
    .green { color:#34A853; }
  </style>
</head>

<body>

<div id="profileContainer">
  <div id="profileBtn" onclick="toggleProfileMenu()"></div>

  <div id="profileMenu" class="menu">
    <button onclick="toggleTheme()">Dark mode</button>
    <button onclick="logoutUser()">Sign out</button>
    <button onclick="deleteAccount()" style="color:red;">Delete account</button>
  </div>
</div>

<div class="top">

  <div class="logo" onclick="location.href='index.html'">
    <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span>
    <span class="blue">b</span><span class="green">g</span><span class="red">l</span><span class="yellow">e</span>
  </div>

  <input id="q">
  <button onclick="search()">Search</button>

</div>

<div class="gcse-searchresults-only"></div>

<script type="module">
import { currentUser, saveSearch } from "./firebase.js";

let user = null;

currentUser(u => user = u);

window.search = async function () {
  let q = document.getElementById("q").value;
  if (user) await saveSearch(user, q);

  location.href = "results.html?q=" + encodeURIComponent(q);
};

document.getElementById("q").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});
</script>

</body>
</html>
